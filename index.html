<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>月评 - 中文音乐评论</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body class="listening-review-page">
    <header class="listening-header">
      <a class="listening-brand" href="index.html" aria-label="月评首页">
        <span>月评</span>
        <small>YUEPING</small>
      </a>
      <nav class="listening-nav" aria-label="主导航">
        <a href="index.html">首页</a>
        <i>/</i>
        <a href="reviews.html">乐评</a>
        <i>/</i>
        <a href="pages/archive.html">专辑</a>
        <i>/</i>
        <a href="pages/zine.html">文字</a>
        <i>/</i>
        <a href="submit.html">投稿</a>
      </nav>
      <button class="sound-button" aria-label="播放装饰">
        <span></span><span></span><span></span>
      </button>
    </header>

    <main class="listening-stage">
      <section class="album-panel" aria-label="专辑展示">
        <div class="album-visual">
          <div class="vinyl-disc" aria-hidden="true">
            <span class="vinyl-label"></span>
            <span class="vinyl-sheen"></span>
          </div>

          <figure class="album-cover">
            <img class="cover-image" data-review-cover alt="" />
            <div class="cover-noise" aria-hidden="true"></div>
            <div class="cover-mark" aria-hidden="true"></div>
            <figcaption>
              <span data-review-cover-title>| 专辑 |</span>
              <strong data-review-cover-artist>艺人</strong>
            </figcaption>
          </figure>
        </div>

        <div class="album-meta">
          <p class="meta-kicker">正在阅读 / 正在播放</p>
          <h1 data-review-title>等待第一篇乐评</h1>
          <dl>
            <div>
              <dt>艺人</dt>
              <dd data-review-artist>未知</dd>
            </div>
            <div>
              <dt>类型</dt>
              <dd data-review-genre>未分类</dd>
            </div>
            <div>
              <dt>年份</dt>
              <dd data-review-year>--</dd>
            </div>
            <div>
              <dt>评分</dt>
              <dd data-review-score>--</dd>
            </div>
          </dl>
        </div>
      </section>

      <article class="review-reader" aria-label="乐评正文">
        <div class="review-scroll">
          <p class="meta-kicker">// 乐评</p>
          <h2 data-review-title>等待第一篇乐评</h2>

          <div class="review-byline">
            <span><b>专辑</b><span data-review-album>暂无</span></span>
            <span><b>评分</b><span><span data-review-score>--</span> / 10</span></span>
            <span><b>作者</b><span data-review-author>编辑部</span></span>
            <span><b>发布</b><span data-review-date>待发布</span></span>
          </div>

          <div data-review-body></div>

          <h3>推荐曲目</h3>
          <ul class="track-list" data-review-tracks></ul>
        </div>
        <div class="review-footer-nav" aria-label="上一篇和下一篇">
          <a href="#" data-review-prev><span>上一篇</span>暂无</a>
          <a class="review-grid-button" href="reviews.html" aria-label="乐评列表"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></a>
          <a href="#" data-review-next><span>下一篇</span>暂无</a>
        </div>
      </article>
    </main>

    <script src="assets/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/reviews.js"></script>
  </body>
</html>
