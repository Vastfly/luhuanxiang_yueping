        <article>
          <span>专题</span>
          <h2>如何写一篇有声音的乐评</h2>
          <p>从第一遍聆听开始，记录结构、音色、歌词、场景和身体反应，再把判断藏进具体的句子里。</p>
        </article>
        <article>
          <span>回听</span>
          <h2>旧唱片为什么会在某一年突然变新</h2>
          <p>时间会改变作品的位置。我们不只是在听一张专辑，也是在听自己曾经错过的部分。</p>
        </article>
        <article>
          <span>编辑部</span>
          <h2>投稿说明</h2>
          <p>月评欢迎长文、短评和私人化的聆听笔记。请尽量写具体的声音，而不只是结论。</p>
        </article>
