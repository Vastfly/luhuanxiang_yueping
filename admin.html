<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>审核后台 - 月评</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body class="review-admin-page">
    <header class="listening-header">
      <a class="listening-brand" href="index.html" aria-label="月评首页">
        <span>月评</span>
        <small>YUEPING</small>
      </a>
      <nav class="listening-nav" aria-label="主导航">
        <a href="index.html">首页</a>
        <i>/</i>
        <a href="reviews.html">乐评</a>
        <i>/</i>
        <a href="submit.html">投稿</a>
      </nav>
    </header>

    <main class="admin-shell">
      <section class="admin-intro">
        <p class="meta-kicker">// 编辑部</p>
        <h1>审核后台</h1>
        <p>管理员可以查看待审核投稿，并将合格乐评发布到前台。</p>
        <p class="backend-mode" data-backend-mode>正在检查后端连接...</p>
      </section>

      <section class="admin-login" data-auth-panel hidden>
        <h2>管理员登录</h2>
        <p>请使用已加入 `admin_users` 的 Supabase 账号登录。</p>
        <form data-login-form>
          <label>
            邮箱
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            密码
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <div class="admin-actions">
            <button type="submit">登录</button>
            <p data-login-status></p>
          </div>
        </form>
      </section>

      <section class="moderation-panel" data-admin-panel hidden>
        <div class="admin-toolbar">
          <span data-session-label></span>
          <button type="button" data-sign-out hidden>退出登录</button>
        </div>
        <div class="moderation-heading">
          <h2>待审核投稿</h2>
          <p data-admin-status>正在加载...</p>
        </div>
        <div class="moderation-list" data-moderation-list></div>
      </section>
    </main>

    <script src="assets/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/reviews.js"></script>
  </body>
</html>
